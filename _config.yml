title: "Jieqi Shi"
name: "Jieqi Shi"
description: "Academic homepage of Jieqi Shi"
url: "https://jayceeshi.github.io"
baseurl: ""
repository: "jayceeshi/jayceeshi.github.io"
locale: "en-US"
timezone: "Asia/Shanghai"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
markdown: kramdown
permalink: /:categories/:title/

author:
  name: "Jieqi Shi"
  avatar: "/assets/images/me.png"
  bio: "Associate Professor · Nanjing University"
  location: "Suzhou, China"
  employer: "School of Intelligence Science and Technology, Nanjing University"
  email: "jayceesjq@gmail.com"
  uri: "https://jayceeshi.github.io"

collections:
  publications:
    output: true
    permalink: /publication/:path/
  teaching:
    output: true
    permalink: /teaching/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - _pages
  - files

exclude:
  - README.md
  - LICENSE
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache

footer:
  links: []

atom_feed:
  hide: true

search: false
